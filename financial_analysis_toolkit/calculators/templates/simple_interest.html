{% extends 'base.html' %}

{% block title %}Simple Interest{% endblock %}
{% block body %}
<h2>🧮 Simple Interest Calculator</h2>

<form method="POST" class="row g-3">
    <div class="col-md-4">
        <label for="principal" class="form-label">Principal ($)</label>
        <input type="number" step="0.01" class="form-control" name="principal" required>
    </div>
    <div class="col-md-4">
        <label for="rate" class="form-label">Annual Rate (%)</label>
        <input type="number" step="0.01" class="form-control" name="rate" required>
    </div>
    <div class="col-md-4">
        <label for="years" class="form-label">Years</label>
        <input type="number" step="0.1" class="form-control" name="years" required>
    </div>
    <div class="col-md-4">
        <label for="tax" class="form-label">Tax Rate (%)</label>
        <input type="number" step="0.01" class="form-control" name="tax" value="30">
    </div>
    <div class="col-md-4">
        <label for="inflation" class="form-label">Inflation Rate (%)</label>
        <input type="number" step="0.01" class="form-control" name="inflation" value="3">
    </div>

    <div class="col-12">
        <button type="submit" class="btn btn-primary">Calculate</button>
    </div>
</form>

{% if result_nominal is not none %}
<div class="alert alert-success mt-4">
    <strong>Result:</strong> ${{ result_nominal | round(2) }}
</div>
<div class="alert alert-success mt-4">
    <strong>Total Result:</strong> ${{ result_total | round(2) }}
</div>
{% endif %}

{% endblock %}
